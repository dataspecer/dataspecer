# https://lannonbr.com/blog/2019-12-09-git-commit-in-actions/

# Based on https://github.com/RadStr/test-repo-for-gh-actions/blob/main/.github/workflows/git-commit-simple.yml


name: Generate specification and commit it to different main repo

permissions:
  contents: write


env:
  GITHUB_REPO_OWNER_AND_NAME: ${{ github.repository }}
  PUBLICATION_BRANCH: publication-branch
  DIRECTORY_WITH_GENERATED_CONTENT: generated-content
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  push:
    paths-ignore:
      - '${DIRECTORY_WITH_GENERATED_CONTENT}/**'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: false

jobs:
  date:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true     # We can live without this
      matrix:
        node-version: [ "22.6" ]
    steps:
      # Checkout the branch
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # TODO RadStr: Maybe can be organized better into different jobs - so stuff can run in parallel
      # Build and checkout DS repo
      - name: Checkout DS repo
        uses: actions/checkout@v4
        with:
          repository: dataspecer/dataspecer
          path: dataspecer-source-code
          token: ${{ secrets.GITHUB_TOKEN }}   # Should not be needed sice we get it from the public version of repository
          ref: git-integration    # TODO RadStr PR: In future use main branch
      # Prepare node and build Dataspecer using npm run build
      - name: Copy config
        working-directory: dataspecer-source-code/services/backend
        run: cp main.config.sample.js main.config.js
      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install packages
        working-directory: dataspecer-source-code
        run: npm ci
      # Step comes from ChatGPT (https://chatgpt.com/share/69c6e9b1-3ab4-8330-a951-b05da49955e9)
      - name: Remove applications workspace     # TODO RadStr PR: Just a hacky solution to not build the applications. It could be probably done more cleanly
                                                #                 Takes around 1m40s-1m50s with building /applications. 50s-60s without
        working-directory: dataspecer-source-code
        run: |
          jq ' .workspaces |= map(select(. != "applications/*")) ' package.json > tmp.json
          mv tmp.json package.json
      - name: Build
        working-directory: dataspecer-source-code
        run: npm run build

      - name: Get publication branch name
        id: getPublicationBranchName
        working-directory: dataspecer-source-code/packages/git
        run: |
          VALUE=$(npm run read-publication-branch --silent "../../..")
          echo "publication_branch=$VALUE" >> $GITHUB_OUTPUT

      # Following two steps are generated by ChatGPT - they are trying to solve the issue
      #  that the publication-branch may not exist, since the name was changed in the Git config
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: generated-content
          ref: ${{ github.ref }} # fallback if branch exists
      - name: Create branch if missing
        working-directory: generated-content
        run: |
          BRANCH_NAME=${{ steps.getPublicationBranchName.outputs.publication_branch }}
          if ! git ls-remote --exit-code --heads origin $BRANCH_NAME; then
            git checkout -b $BRANCH_NAME
            git push origin $BRANCH_NAME
          else
            git fetch origin $BRANCH_NAME:$BRANCH_NAME    # We have to fetch, we have fetched only the current (main) branch
            git checkout $BRANCH_NAME
          fi
      - name: Build backend   # TODO RadStr: Probably unnecessary
        working-directory: dataspecer-source-code/services/backend
        run: npm run build


    # Run DS backend
      - name: Update database
        working-directory: dataspecer-source-code/services/backend
        run: npm run update-database
      - name: Run the backend
        working-directory: dataspecer-source-code/services/backend
        # Just a note on a previous implementation, since it might be useful in future.
        #  Previously we run the generation on GitHub zip file with the repo: https://github.com/dataspecer/dataspecer/commit/ae5c188da22eea5336c7592388977a36631c9d49
        run: npm run generate-specification
      - name: Move the generated artifacts to correct directory
        run: |
          rm -rf ${DIRECTORY_WITH_GENERATED_CONTENT}/artifacts/*   # We remove the content of the directory and then replace it with the newly generated content
          mkdir -p ${DIRECTORY_WITH_GENERATED_CONTENT}/artifacts

          # Since we don't need to share data between different jobs we can just use the filesystem instead of uploading artifacts using specific GH action
          mv dataspecer-source-code/services/backend/test-generate-specification/* ${DIRECTORY_WITH_GENERATED_CONTENT}/artifacts


      # Code is ChatGPT inspired. We just create simple index files which has the html links directories inside /artifacts
      - name: Generate HTML index
        run: |
          OUTPUT="index.html"
          cd "$GITHUB_WORKSPACE/$DIRECTORY_WITH_GENERATED_CONTENT"
          TARGET_DIR="artifacts"

          echo "<!DOCTYPE html>" > $OUTPUT
          echo "<html><body>" >> $OUTPUT
          echo "<h1>Existing documentation languages</h1>" >> $OUTPUT
          echo "<ul>" >> $OUTPUT

          # Loop through entries and include only directories
          for entry in "$TARGET_DIR"/*; do
            if [ -d "$entry" ]; then
              dirname=$(basename "$entry")
              echo "<li><a href=\"$TARGET_DIR/$dirname\">$dirname</a></li>" >> $OUTPUT
            fi
          done

          echo "</ul>" >> $OUTPUT
          echo "</body></html>" >> $OUTPUT


      - name: Setup git config
        run: |
          # setup the username and email. We can use 'GitHub Actions Bot' with no email by default
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # ... The person who committed should be the one to generate the commit even though it is done by bot
          # Maybe should be github.actor instead for name? but probably not.
          git config --global user.name ${{ github.event.head_commit.author.name }}
          git config --global user.email ${{ github.event.head_commit.author.email }}


      - name: Commit
        run: |
          # Stage the file, commit and push
          cd ${DIRECTORY_WITH_GENERATED_CONTENT}
          git status
          echo "before branch"
          git branch --show-current
          echo "after branch"

          git branch
          rm -rf ./.github       # The workflow file would cause recursion
          cp "$GITHUB_WORKSPACE/README.md" .
          git add .
          git status
          git remote -v
          git commit -m "Commit from GitHub action"

      - name: Set remote
        run: |
          cd ${DIRECTORY_WITH_GENERATED_CONTENT}
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

      - name: Push
        run: |
          cd ${DIRECTORY_WITH_GENERATED_CONTENT}
          git remote -v
          git status
          git branch
          git log
          git push -u origin ${{ steps.getPublicationBranchName.outputs.publication_branch }}

# Pushing is based on https://sameeradissanayaka.medium.com/how-to-use-github-actions-to-push-code-commit-to-another-branch-af04d8406f08